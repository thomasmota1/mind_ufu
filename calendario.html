<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário - Mind UFU</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style-global.css">

<style>
.calendar-wrapper{
    background:#fff;
    padding:25px;
    border-radius:16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.calendar-weekdays,
.calendar-days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.calendar-days .dia{
    height:100px;
    padding:6px;
    border-radius:12px;
    border:1px solid #eee;
    cursor:pointer;
    overflow-y:auto;
    transition:.2s;
}

.calendar-days .dia:hover{
    background:#f1f5ff;
    transform:scale(1.02);
}

.hoje{
    border:2px solid #0d6efd !important;
}

.numero-dia{
    font-weight:600;
    font-size:13px;
}

.evento{
    font-size:10px;
    padding:3px 6px;
    border-radius:6px;
    margin-top:3px;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-link.active{
    background:#0d6efd !important;
    color:#fff !important;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="container-fluid">
            <div class="calendar-wrapper">

                <header class="d-flex justify-content-between mb-3">
                    <button class="btn btn-outline-primary btn-sm" onclick="mudarMes(-1)">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <h5 id="mesAno"></h5>
                    <button class="btn btn-outline-primary btn-sm" onclick="mudarMes(1)">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </header>

                <div class="calendar-weekdays text-center fw-bold text-muted">
                    <div>Dom</div><div>Seg</div><div>Ter</div>
                    <div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>

                <div class="calendar-days" id="dias"></div>

            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="eventoModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Evento</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="hidden" id="eventoId">

<div class="mb-3">
<label class="form-label">Título</label>
<input type="text" class="form-control" id="titulo">
</div>

<div class="mb-3">
<label class="form-label">Descrição</label>
<textarea class="form-control" id="descricao"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Cor</label>
<input type="color" class="form-control form-control-color" id="cor" value="#0d6efd">
</div>
</div>

<div class="modal-footer">
<button class="btn btn-danger me-auto" id="btnExcluir" style="display:none;">
<i class="bi bi-trash"></i> Excluir
</button>
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
<button class="btn btn-primary" onclick="salvarEvento()">Salvar</button>
</div>

</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/sidebar.js?v=2"></script>

<script>
let dataAtual = new Date();
let eventos = [];
let dataSelecionada = null;
let modal = new bootstrap.Modal(document.getElementById('eventoModal'));

// Obter ID do usuário logado
function getUsuarioId() {
    const userData = JSON.parse(localStorage.getItem('usuario') || '{}');
    return userData.id || 0;
}

$(document).ready(()=>{

    if(typeof loadSidebar === "function"){
        loadSidebar();
    }

    // Verificar se está logado
    if(!getUsuarioId()) {
        window.location.href = 'index.html';
        return;
    }

    setTimeout(()=>{
        $(".nav-link").removeClass("active");
        $(".nav-link[href*='calendario']").addClass("active");
    },200);

    carregarEventos();
});

function carregarEventos(){
const userId = getUsuarioId();
fetch(`php/api_eventos.php?acao=listar&ano=${dataAtual.getFullYear()}&mes=${dataAtual.getMonth()+1}&usuario_id=${userId}`)
.then(r=>r.json())
.then(dados=>{
    eventos = Array.isArray(dados)?dados:[];
    renderCalendar();
});
}

function renderCalendar(){

const mes = dataAtual.getMonth();
const ano = dataAtual.getFullYear();
const hoje = new Date().toISOString().split("T")[0];

const primeiroDia = new Date(ano,mes,1).getDay();
const ultimoDia = new Date(ano,mes+1,0).getDate();

const meses=["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

$("#mesAno").text(`${meses[mes]} ${ano}`);

let html="";

for(let i=0;i<primeiroDia;i++) html+="<div></div>";

for(let dia=1;dia<=ultimoDia;dia++){

let dataFormatada=ano+"-"+String(mes+1).padStart(2,'0')+"-"+String(dia).padStart(2,'0');
let classeHoje=dataFormatada===hoje?"hoje":"";

html+=`
<div class="dia ${classeHoje}" onclick="abrirModal('${dataFormatada}')">
<div class="numero-dia">${dia}</div>
${renderEventosDoDia(dataFormatada)}
</div>`;
}

$("#dias").html(html);
}

function renderEventosDoDia(data){
return eventos
.filter(e=>e.data_inicio.startsWith(data))
.map(e=>`
<div class="evento"
style="background:${e.cor}"
onclick="event.stopPropagation(); editarEvento(${e.id})">
${e.titulo}
</div>`).join("");
}

function abrirModal(data){
dataSelecionada=data;
$("#eventoId").val("");
$("#titulo").val("");
$("#descricao").val("");
$("#cor").val("#0d6efd");
$("#btnExcluir").hide();
modal.show();
}

function editarEvento(id){
let evento=eventos.find(e=>e.id==id);
dataSelecionada=evento.data_inicio.split(" ")[0];
$("#eventoId").val(evento.id);
$("#titulo").val(evento.titulo);
$("#descricao").val(evento.descricao);
$("#cor").val(evento.cor);
$("#btnExcluir").show().off().click(()=>excluirEvento(id));
modal.show();
}

function salvarEvento(){
let id=$("#eventoId").val();
let titulo=$("#titulo").val();
let descricao=$("#descricao").val();
let cor=$("#cor").val();
let userId = getUsuarioId();

let acao=id?"editar":"criar";

fetch(`php/api_eventos.php?acao=${acao}&usuario_id=${userId}`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
id:id,
titulo:titulo,
descricao:descricao,
data_inicio:dataSelecionada+" 00:00:00",
cor:cor,
usuario_id:userId
})
}).then(()=>{
modal.hide();
carregarEventos();
});
}

function excluirEvento(id){
let userId = getUsuarioId();
fetch(`php/api_eventos.php?acao=excluir&id=${id}&usuario_id=${userId}`)
.then(()=>{
modal.hide();
carregarEventos();
});
}

function mudarMes(v){
dataAtual.setMonth(dataAtual.getMonth()+v);
carregarEventos();
}
</script>

</body>
</html>
