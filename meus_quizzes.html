<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Quizzes Salvos - Mind UFU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style-global.css">
</head>
<body>

<div class="app-wrapper">
    <div id="sidebar-container"></div> <main class="main-content p-4">
        <h2 class="fw-bold mb-4"><i class="bi bi-bookmark-star-fill text-warning"></i> Atividades Salvas</h2>
        
        <div id="loading" class="text-center"><div class="spinner-border text-primary"></div></div>
        
        <div id="lista-salvos" class="row g-3">
            </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="assets/js/sidebar.js?v=2"></script>

<script>
    const API_URL = 'php/api_comunidades.php';

    // Obter ID do usuário logado
    function getUsuarioId() {
        const userData = JSON.parse(localStorage.getItem('usuario') || '{}');
        return userData.id || 0;
    }

    $(document).ready(() => {
        if(typeof loadSidebar === 'function') loadSidebar();

        // Verificar se está logado
        if(!getUsuarioId()) {
            window.location.href = 'index.html';
            return;
        }

        carregarSalvos();
    });

    function carregarSalvos() {
        $.get(API_URL, { acao: 'listar_meus_quizzes', usuario_id: getUsuarioId() })
            .done(function(res) {
                let data = (typeof res === 'string') ? JSON.parse(res) : res;
                let html = '';

                // Verificar se é um array válido
                if(!Array.isArray(data)) {
                    html = '<div class="col-12 text-center text-muted mt-5"><h5>Você ainda não salvou nenhuma atividade.</h5><p>Vá até uma comunidade e clique em "Salvar".</p></div>';
                } else if(data.length === 0) {
                    html = '<div class="col-12 text-center text-muted mt-5"><h5>Você ainda não salvou nenhuma atividade.</h5><p>Vá até uma comunidade e clique em "Salvar".</p></div>';
                } else {
                    data.forEach(q => {
                        html += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card shadow-sm h-100 border-0">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="badge" style="background-color: ${q.comunidade_cor}">${q.comunidade_nome}</span>
                                        <button class="btn btn-sm text-danger" onclick="removerSalvo(${q.id})" title="Remover da lista"><i class="bi bi-x-lg"></i></button>
                                    </div>
                                    <h5 class="card-title fw-bold">${q.titulo}</h5>
                                    <p class="card-text small text-muted">${q.descricao || 'Sem descrição'}</p>
                                    <a href="realizar_quiz.html?id=${q.id}" class="btn btn-primary w-100 mt-3">
                                        <i class="bi bi-play-fill"></i> Resolver Agora
                                    </a>
                                </div>
                            </div>
                        </div>`;
                    });
                }
                $('#lista-salvos').html(html);
                $('#loading').hide();
            })
            .fail(function() {
                $('#lista-salvos').html('<div class="col-12 text-center text-muted mt-5"><h5>Você ainda não salvou nenhuma atividade.</h5><p>Vá até uma comunidade e clique em "Salvar".</p></div>');
                $('#loading').hide();
            });
    }

    function removerSalvo(id) {
        if(confirm("Remover da sua lista?")) {
            $.post(API_URL, { acao: 'remover_salvo', quiz_id: id, usuario_id: getUsuarioId() }, function() {
                carregarSalvos();
            });
        }
    }
</script>
</body>
</html>
