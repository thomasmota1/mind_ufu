<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Mind UFU</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            margin-bottom: 25px;
            color: #111827;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #2563eb;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">🧠</div>
        <h1>Criar Conta</h1>

        <form onsubmit="event.preventDefault(); alert('Cadastro realizado com sucesso!'); window.location.href='index.html';">
            <input type="text" placeholder="Nickname" required>
            <input type="email" placeholder="E-mail" required>
            <input type="password" placeholder="Senha" required>
            <input type="password" placeholder="Confirmar senha" required>

            <button type="submit">Finalizar Cadastro</button>
        </form>

        <div class="links">
            <a href="index.html">← Voltar para o login</a>
        </div>

        <div class="footer">Mind UFU · Cadastro</div>
    </div>
</body>
</html>
