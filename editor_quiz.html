<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Quiz - Mind UFU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style-global.css">
</head>
<body class="bg-light">

<div class="container py-4 mw-800">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <button onclick="window.history.back()" class="btn btn-link text-decoration-none text-muted p-0 mb-1">
                <i class="bi bi-arrow-left"></i> Voltar
            </button>
            <h2 class="fw-bold m-0">✏️ Editor de Quiz</h2>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-danger" onclick="deletarQuizInteiro()">
                <i class="bi bi-trash"></i> Excluir
            </button>
            <button class="btn btn-success fw-bold shadow-sm" onclick="publicarQuiz()">
                <i class="bi bi-send-check"></i> Publicar Quiz
            </button>
        </div>
    </div>
    
    <div class="card mb-4 border-0 shadow-sm border-start border-4 border-primary">
        <div class="card-body">
            <h5 class="card-title text-primary fw-bold mb-3">Informações Básicas</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label small text-muted">Título</label>
                    <input type="text" id="editTitulo" class="form-control fw-bold">
                </div>
                <div class="col-md-4">
                    <label class="form-label small text-muted">Descrição</label>
                    <input type="text" id="editDesc" class="form-control">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="editPermiteSalvar" checked>
                        <label class="form-check-label small" for="editPermiteSalvar">
                            Permitir salvar antes de fazer
                        </label>
                    </div>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-outline-primary w-100" onclick="salvarDetalhes()">
                        <i class="bi bi-save"></i> Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-5">
        <div class="card-body p-4">
            <h5 class="card-title fw-bold text-dark mb-3">➕ Adicionar Pergunta</h5>
            
            <div class="mb-3">
                <textarea id="textoPergunta" class="form-control bg-light" rows="2" placeholder="Digite o enunciado da questão aqui..."></textarea>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label fw-bold small text-muted m-0">Alternativas (Selecione a correta)</label>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="adicionarAlternativa()">
                    <i class="bi bi-plus"></i> Adicionar
                </button>
            </div>

            <div id="container-alternativas" class="vstack gap-2">
                <!-- Alternativas dinamicas -->
            </div>

            <button class="btn btn-dark w-100 mt-3 fw-bold" onclick="salvarPergunta()">
                Adicionar ao Quiz
            </button>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold m-0">Perguntas Criadas</h5>
        <span class="badge bg-secondary" id="contador-perguntas">0</span>
    </div>
    
    <div id="lista-perguntas">
        </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastNotif" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- Modal Confirmar Publicar -->
<div class="modal fade" id="modalPublicar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Publicar quiz</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-0">O quiz ficara visivel para todos os membros da comunidade.</p>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="confirmarPublicar()">Publicar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Confirmar Excluir Quiz -->
<div class="modal fade" id="modalExcluirQuiz" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Excluir quiz</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-0">Isso apagara o quiz e todas as perguntas permanentemente.</p>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger" onclick="confirmarExcluirQuiz()">Excluir</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Confirmar Excluir Pergunta -->
<div class="modal fade" id="modalExcluirPergunta" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Excluir pergunta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-0">Tem certeza que deseja apagar esta pergunta?</p>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger" onclick="confirmarExcluirPergunta()">Excluir</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const idQuiz = new URLSearchParams(window.location.search).get('id');

    // Obter ID do usuário logado
    function getUsuarioId() {
        const userData = JSON.parse(localStorage.getItem('usuario') || '{}');
        return userData.id || 0;
    }

    $(document).ready(() => {
        // Verificar se está logado
        if(!getUsuarioId()) {
            window.location.href = 'index.html';
            return;
        }

        if(!idQuiz) { window.history.back(); return; }

        // Inicializar com 2 alternativas
        adicionarAlternativa();
        adicionarAlternativa();

        carregarDadosIniciais();
    });

    function getLetraAlternativa(index) {
        return String.fromCharCode(65 + index); // A, B, C, D...
    }

    function adicionarAlternativa() {
        const container = $('#container-alternativas');
        const index = container.children().length;
        const letra = getLetraAlternativa(index);
        const checked = index === 0 ? 'checked' : '';

        const html = `
            <div class="input-group alternativa-item">
                <div class="input-group-text bg-white border-end-0">
                    <input class="form-check-input mt-0" type="radio" name="correta" value="${index}" ${checked}>
                </div>
                <input type="text" class="form-control opcao-input border-start-0" placeholder="Alternativa ${letra}">
                <button type="button" class="btn btn-outline-danger border-start-0" onclick="removerAlternativa(this)" title="Remover">
                    <i class="bi bi-x"></i>
                </button>
            </div>`;

        container.append(html);
        atualizarBotoesRemover();
    }

    function removerAlternativa(btn) {
        const container = $('#container-alternativas');
        if(container.children().length <= 2) {
            mostrarToast("Minimo de 2 alternativas!", "warning");
            return;
        }

        $(btn).closest('.alternativa-item').remove();
        reindexarAlternativas();
        atualizarBotoesRemover();
    }

    function reindexarAlternativas() {
        $('#container-alternativas .alternativa-item').each(function(index) {
            const letra = getLetraAlternativa(index);
            $(this).find('input[type="radio"]').val(index);
            $(this).find('.opcao-input').attr('placeholder', 'Alternativa ' + letra);
        });

        // Garantir que pelo menos um radio esteja selecionado
        if($('input[name="correta"]:checked').length === 0) {
            $('input[name="correta"]').first().prop('checked', true);
        }
    }

    function atualizarBotoesRemover() {
        const total = $('#container-alternativas').children().length;
        // Desabilitar botões de remover se tiver apenas 2
        $('#container-alternativas .btn-outline-danger').prop('disabled', total <= 2);
    }

    function carregarDadosIniciais() {
        $.get('php/api_comunidades.php', { acao: 'get_quiz_full', quiz_id: idQuiz, usuario_id: getUsuarioId() }, function(res){
            let data = typeof res === 'string' ? JSON.parse(res) : res;

            // Preenche info básica
            $('#editTitulo').val(data.quiz.titulo);
            $('#editDesc').val(data.quiz.descricao);
            $('#editPermiteSalvar').prop('checked', data.quiz.permite_salvar_antes == 1 || data.quiz.permite_salvar_antes === null);
            
            let html = '';
            if(data.perguntas.length > 0) {
                data.perguntas.forEach((p, idx) => {
                    html += `
                    <div class="card mb-2 border-0 shadow-sm animate-up">
                        <div class="card-body d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="fw-bold mb-1"><span class="text-primary">#${idx+1}</span> ${p.enunciado}</h6>
                                <small class="text-muted">${p.alternativas.length} alternativas cadastradas</small>
                            </div>
                            <button onclick="excluirPergunta(${p.id})" class="btn btn-sm btn-outline-danger border-0" title="Remover">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                    </div>`;
                });
            } else {
                html = '<div class="text-center text-muted py-4 border rounded border-dashed bg-white">Nenhuma pergunta adicionada ainda.</div>';
            }
            
            $('#lista-perguntas').html(html);
            $('#contador-perguntas').text(data.perguntas.length);
        });
    }

    function mostrarToast(msg, tipo = "success") {
        const toast = document.getElementById('toastNotif');
        toast.className = 'toast align-items-center border-0 text-bg-' + tipo;
        document.getElementById('toastMsg').textContent = msg;
        new bootstrap.Toast(toast).show();
    }

    function salvarDetalhes() {
        $.post('php/api_comunidades.php', {
            acao: 'editar_quiz_info',
            quiz_id: idQuiz,
            titulo: $('#editTitulo').val(),
            descricao: $('#editDesc').val(),
            permite_salvar_antes: $('#editPermiteSalvar').is(':checked') ? 1 : 0,
            usuario_id: getUsuarioId()
        }, () => mostrarToast("Informacoes atualizadas!"));
    }

    function salvarPergunta() {
        const enunciado = $('#textoPergunta').val();
        const opcoes = [];
        $('.opcao-input').each(function() { opcoes.push($(this).val()); });
        const corretaIndex = $('input[name="correta"]:checked').val();

        if(!enunciado.trim()) {
            mostrarToast("Preencha o enunciado!", "warning");
            return;
        }

        if(opcoes.some(o => o.trim() === "")) {
            mostrarToast("Preencha todas as alternativas!", "warning");
            return;
        }

        $.post('php/api_comunidades.php', {
            acao: 'salvar_pergunta',
            quiz_id: idQuiz,
            enunciado: enunciado,
            opcoes: opcoes,
            correta: corretaIndex,
            usuario_id: getUsuarioId()
        }, function(res) {
            let data = typeof res === 'string' ? JSON.parse(res) : res;
            if(data.status === 'sucesso') {
                // Limpar campos
                $('#textoPergunta').val('');
                // Resetar para 2 alternativas vazias
                $('#container-alternativas').empty();
                adicionarAlternativa();
                adicionarAlternativa();
                // Atualiza lista
                carregarDadosIniciais();
                $('html, body').animate({ scrollTop: $(document).height() }, 'slow');
            } else {
                mostrarToast("Erro: " + data.msg, "danger");
            }
        });
    }

    let perguntaParaExcluir = null;

    function excluirPergunta(pid) {
        perguntaParaExcluir = pid;
        new bootstrap.Modal(document.getElementById('modalExcluirPergunta')).show();
    }

    function confirmarExcluirPergunta() {
        if(perguntaParaExcluir) {
            $.post('php/api_comunidades.php', { acao: 'excluir_pergunta', pergunta_id: perguntaParaExcluir, usuario_id: getUsuarioId() }, () => {
                bootstrap.Modal.getInstance(document.getElementById('modalExcluirPergunta')).hide();
                carregarDadosIniciais();
            });
        }
    }

    function deletarQuizInteiro() {
        new bootstrap.Modal(document.getElementById('modalExcluirQuiz')).show();
    }

    function confirmarExcluirQuiz() {
        $.post('php/api_comunidades.php', { acao: 'excluir_quiz', quiz_id: idQuiz, usuario_id: getUsuarioId() }, function(){
            window.location.href = document.referrer;
        });
    }

    function publicarQuiz() {
        new bootstrap.Modal(document.getElementById('modalPublicar')).show();
    }

    function confirmarPublicar() {
        $.post('php/api_comunidades.php', { acao: 'publicar_quiz', quiz_id: idQuiz, usuario_id: getUsuarioId() }, function(){
            bootstrap.Modal.getInstance(document.getElementById('modalPublicar')).hide();
            mostrarToast("Quiz publicado com sucesso!");
            setTimeout(() => window.location.href = document.referrer, 1000);
        });
    }
</script>

<style>
    .border-dashed { border-style: dashed !important; }
    .animate-up { animation: fadeInUp 0.4s ease; }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</body>
</html>
