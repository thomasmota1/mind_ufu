<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="mindufu_logo_2.png" type="image/png">
    <title>Login - Mind UFU</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .logo {
            width: 160px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            margin-bottom: 30px;
            color: #1e3a8a;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            margin-top: 18px;
        }

        .links a {
            display: block;
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
            margin-top: 6px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #6b7280;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="mindufu_logo_2.png" alt="Mind UFU Logo" class="logo">
        <h1>Mind UFU</h1>

        <div id="alertBox"></div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit" id="btnLogin">ENTRAR</button>
        </form>

        <div class="links">
            <a href="cadastro.html">Criar conta</a>
        </div>

        <div class="footer">Protótipo - Versão 1.0</div>
    </div>

    <script>
        // Verificar se veio do cadastro
        const params = new URLSearchParams(window.location.search);
        const veioDosCadastro = params.get('cadastro') === 'sucesso';

        if (veioDosCadastro) {
            // Limpar localStorage para permitir novo login
            localStorage.removeItem('usuario');
            showAlert('success', 'Cadastro realizado com sucesso! Faca login.');
        } else {
            // Se ja esta logado, redirecionar para dashboard
            const userData = localStorage.getItem('usuario');
            if (userData) {
                window.location.href = 'dashboard.php';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('btnLogin');
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Entrando...';

            try {
                const formData = new FormData();
                formData.append('acao', 'login');
                formData.append('email', email);
                formData.append('senha', senha);

                const response = await fetch('php/api_usuario.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'sucesso') {
                    
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));

                    
                    window.location.href = 'dashboard.php';
                } else {
                    showAlert('danger', data.msg);
                    btn.disabled = false;
                    btn.innerHTML = 'ENTRAR';
                }
            } catch (error) {
                showAlert('danger', 'Erro de conexão. Tente novamente.');
                btn.disabled = false;
                btn.innerHTML = 'ENTRAR';
            }
        });

        function showAlert(type, msg) {
            document.getElementById('alertBox').innerHTML = `
                <div class="alert alert-${type}">${msg}</div>
            `;
        }
    </script>
</body>
</html>
