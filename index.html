<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mind UFU</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .logo {
            width: 160px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            margin-bottom: 30px;
            color: #1e3a8a;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .links {
            margin-top: 18px;
        }

        .links a {
            display: block;
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
            margin-top: 6px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="mindufu_logo_3_cut.png" alt="Mind UFU Logo" class="logo">
        <h1>Mind UFU</h1>

        <form onsubmit="event.preventDefault(); window.location.href='dashboard.php'">
            
            <input type="text" placeholder="Usuário" required>
            
            <input type="password" placeholder="Senha" required>

            <button type="submit">ENTRAR</button>
        </form>

         <div class="links">
            <a href="cadastro.html">Cadastrar</a>
        </div>

        <div class="footer">Protótipo - Versão 1.0</div>
    </div>
</body>
</html>
